<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨宇宙AI!</title>
  
  <style>
    /* 🎨 網路字型定義 */
    @font-face {
      font-family: 'AdobeMingStd';
      src: url('fonts/Adobe 明體 Std L.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'AdobeMingStd', "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: #1a1a1a;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 4px 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative; 
    }

    .container {
      background: linear-gradient(135deg, rgba(12, 22, 43, 0.95), rgba(5, 42, 82, 0.95));
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 5px 5px;
      border: 4px solid #000000;
      box-shadow: 12px 12px 0px #000000, 0px 0px 35px rgba(0, 210, 255, 0.35);
      padding: 45px 35px;
      border-radius: 4px;
      width: 90%;
      max-width: 460px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 12px 0;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px #000, 0px 0px 12px #8bd344;
    }

    h2 {
      font-size: 15px;
      color: #00d2ff; 
      background-color: #000000; 
      display: inline-block;
      padding: 6px 15px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.4;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px #8bd344;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.95); 
      border: 3px solid #000000;
      border-radius: 0px;
      color: #8bd344; 
      font-family: monospace, 'AdobeMingStd', "PingFang TC";
      font-size: 16px;
      font-weight: bold;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 25px;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
    }

    textarea:focus {
      outline: none;
      border-color: #00d2ff;
      color: #00d2ff;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 0px 0px 15px rgba(0, 210, 255, 0.5);
    }

    button {
      width: 100%;
      background: #8bd344; 
      color: #000000;
      border: 3px solid #000000;
      padding: 15px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 6px 6px 0px #000000; 
      transition: all 0.1s ease;
    }

    #submitBtn::before { content: "▶ "; font-size: 14px; }

    button:hover {
      background: #00d2ff; 
      box-shadow: 4px 4px 0px #000000;
      transform: translate(2px, 2px);
    }

    button:active {
      box-shadow: 0px 0px 0px #000000;
      transform: translate(6px, 6px);
    }

    .result-box {
      margin-top: 25px;
      padding: 12px;
      background: #000000;
      border: 3px solid #8bd344;
      box-shadow: 6px 6px 0px rgba(0, 210, 255, 0.3);
      animation: glitchIn 0.2s linear;
    }
    
    .result-box h3 { margin: 0; font-size: 16px; color: #8bd344; }
    .hidden { display: none; }

    /* 🌟 新增：線上顯示 QR code 與憑證的彈出視窗樣式 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: linear-gradient(135deg, #0a1128, #101f42);
      border: 4px solid #8bd344;
      box-shadow: 0px 0px 30px rgba(139, 211, 68, 0.4);
      padding: 30px;
      border-radius: 8px;
      display: flex;
      flex-direction: row;
      gap: 30px;
      align-items: center;
      max-width: 800px;
      width: 90%;
      box-sizing: border-box;
    }

    /* 適合手機直式螢幕的 RWD 調整 */
    @media (max-width: 650px) {
      .modal-content {
        flex-direction: column;
        padding: 20px;
        gap: 15px;
      }
    }

    .preview-canvas-container {
      background: #fff;
      padding: 5px;
      box-shadow: 4px 4px 0px #000;
      max-height: 70vh;
      overflow-y: auto;
    }

    .preview-canvas-container canvas {
      display: block;
      width: 280px; /* 限制畫面上模擬發票紙張的寬度 */
      height: auto;
    }

    .qr-display-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex: 1;
      text-align: center;
    }

    .qr-title {
      font-size: 20px;
      color: #00d2ff;
      margin-bottom: 15px;
      font-weight: bold;
      text-shadow: 0px 0px 8px rgba(0, 210, 255, 0.6);
    }

    .qr-box {
      background: white;
      padding: 15px;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }

    .modal-close-btn {
      background: #ff4a4a;
      color: #fff;
      border: 2px solid #000;
      box-shadow: 4px 4px 0px #000;
      padding: 10px 25px;
      font-size: 16px;
    }
    .modal-close-btn:hover {
      background: #ff2a2a;
    }

    @keyframes glitchIn {
      0% { opacity: 0; transform: scaleY(0); }
      50% { opacity: 0.5; transform: scaleY(1.2) skewX(5deg); }
      100% { opacity: 1; transform: scaleY(1) skewX(0deg); }
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="container">
    <h1>👋 歡迎光臨宇宙AI!</h1>
    <h2>關於 2045 年的未來世界，你有什麼想知道的嗎？</h2>

    <form id="questionForm">
      <textarea id="questionInput" placeholder="請輸入您的問題..."></textarea>
      <button type="submit" id="submitBtn">送出問題</button>
    </form>
    
    <div id="resultBox" class="result-box hidden">
      <h3 id="statusText">您的提問已收到！</h3>
    </div>
  </div>

  <div id="onlinePreviewModal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="preview-canvas-container" id="canvasHolder">
        </div>
      
      <div class="qr-display-zone">
        <div class="qr-title">📱 掃描下載回答圖像</div>
        <div class="qr-box" id="modalQrCode"></div>
        <p style="font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.5;">
          未來憑證已線上同步！<br>請使用手機相機掃描上方條碼即可下載。
        </p>
        <button class="modal-close-btn" id="closeModalBtn">確認收件 / 重新開始</button>
      </div>
    </div>
  </div>

  <script>
    // ====== 🚀 自動化核心參數設定 ======
    const GEMINI_API_KEY = "AQ.Ab8RN6JKL1gQkg1s3SzSDakm3JvdTJP20ALDg3_4TvAE1UXSsA"; 
    const INVOICE_BG_URL = "發票Demo.jpg"; 

    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');
    
    const onlinePreviewModal = document.getElementById('onlinePreviewModal');
    const canvasHolder = document.getElementById('canvasHolder');
    const modalQrCode = document.getElementById('modalQrCode');
    const closeModalBtn = document.getElementById('closeModalBtn');

    const OFFLINE_ANSWERS = [
      "2045年的火星殖民地已開通捷運，悠遊卡可以跨星系感應，但上班依魂魄打卡。",
      "那時的貓咪已經全面接管網際網路，人類必須每天提供罐罐換取網頁瀏覽權限。",
      "數位貨幣已退流行，未來最保值的資產是2020年代生產的無污染純淨黑膠唱片。",
      "AI已經學會幫人類談戀愛，微調參數就能模擬出完美的約會回覆，但也少了靈魂。",
      "那時的天氣由氣象局中央大數據控制，每週五固定下螢光色的科技雨來淨化空氣。"
    ];

    // 表單送出事件
    questionForm.addEventListener('submit', async function(e) {
      const userQuestion = questionInput.value.trim();
      e.preventDefault(); 
      
      if (userQuestion === "") {
        alert("請先輸入您的時空疑問再送出喔！");
        return;
      }
      
      statusText.innerText = "⏳ 正在傳輸至 2045 年伺服器...";
      resultBox.classList.remove('hidden');

      // Google 表單備份發送
      const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc0bNtRRcczXZrLHVULaiWmJnYXfdaMkdm8RhRLkCw4HAw-wg/formResponse";
      const targetParam = "entry.1887716438=" + encodeURIComponent(userQuestion);

      fetch(GOOGLE_FORM_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: targetParam
      }).then(() => console.log("🚀 Google Form 發送成功"))
        .catch(err => console.error("表單背景發送提示:", err));

      let aiAnswer = "";
      try {
        aiAnswer = await fetchGemini開示(userQuestion);
      } catch (geminiError) {
        console.warn("⚠️ 網路異常，調用本地晶片答案:", geminiError);
        aiAnswer = OFFLINE_ANSWERS[Math.floor(Math.random() * OFFLINE_ANSWERS.length)];
      }

      try {
        statusText.innerText = "🖥️ 正在線上繪製未來憑證...";
        await processAndGenerateView(userQuestion, aiAnswer);
      } catch (printError) {
        console.error("生成出錯:", printError);
      }

      statusText.innerText = "✨ 生成成功！已在螢幕開啟。";
    });

    // 關閉 Modal 彈出視窗
    closeModalBtn.addEventListener('click', () => {
      onlinePreviewModal.classList.add('hidden');
      resultBox.classList.add('hidden');
      questionInput.value = "";
    });

    // 3. 串接 Gemini API
    async function fetchGemini開示(question) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const systemInstruction = 
        "你是一個裝在時光機「REWIND THE FUTURE」互動裝置裡的宇宙 AI。\n" +
        "回覆限制：\n" +
        "1. 使用者會輸入關於2045年的未來世界，請給予對應且充滿想像、幽默且切合主題的解答。\n" +
        "2. 字數限制：繁體中文 30字至 60 字以內（包含標點符號）。\n" +
        "3. 格式限制：直接輸出解答內容，不要包含任何前言。";

      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 4000); 

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller.signal,
        body: JSON.stringify({
          contents: [{ parts: [{ text: question }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: { temperature: 0.8 }
        })
      });
      clearTimeout(id);

      const data = await response.json();
      return data.candidates[0].content.parts[0].text.trim();
    }

    // 4. Canvas 文字自動折行演算法
    function wrapText(ctx, text, maxWidth) {
      const words = Array.from(text);
      const lines = [];
      let currentLine = "";
      for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i];
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && i > 0) {
          lines.push(currentLine);
          currentLine = words[i];
        } else {
          currentLine = testLine;
        }
      }
      lines.push(currentLine);
      return lines;
    }

    // 5. 影像排版與彈窗中樞
    function processAndGenerateView(question, aiAnswer) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.crossOrigin = "anonymous";
        img.src = INVOICE_BG_URL;

        // 🎯 請將此處換成您上傳至伺服器或生成出來，實際要給觀眾下載的「回答圖像網址」
        const downloadUrl = `https://your-domain.com/download?q=${encodeURIComponent(question.substring(0,10))}`;

        img.onload = function() {
          canvas.width = 384; 
          canvas.height = img.height || 450;
          
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          
          ctx.fillStyle = "#000000";
          ctx.font = "11px 'AdobeMingStd', 'Microsoft JhengHei', 'PingFang TC', sans-serif";

          ctx.fillText(question.substring(0, 15), 180, 232); 
          
          const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
          ctx.fillText(currentTime, 1
