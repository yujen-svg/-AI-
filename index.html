<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨宇宙AI!</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* 🎨 網路字型定義 */
    @font-face {
      font-family: 'AdobeMingStd';
      src: url('fonts/Adobe 明體 Std L.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'AdobeMingStd', "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: #1a1a1a;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 4px 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative; 
    }

    .container {
      background: linear-gradient(135deg, rgba(12, 22, 43, 0.95), rgba(5, 42, 82, 0.95));
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 5px 5px;
      border: 4px solid #000000;
      box-shadow: 12px 12px 0px #000000, 0px 0px 35px rgba(0, 210, 255, 0.35);
      padding: 45px 35px;
      border-radius: 4px;
      width: 90%;
      max-width: 460px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 12px 0;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px #000, 0px 0px 12px #8bd344;
    }

    h2 {
      font-size: 15px;
      color: #00d2ff; 
      background-color: #000000; 
      display: inline-block;
      padding: 6px 15px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.4;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px #8bd344;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.95); 
      border: 3px solid #000000;
      border-radius: 0px;
      color: #8bd344; 
      font-family: monospace, 'AdobeMingStd', "PingFang TC";
      font-size: 16px;
      font-weight: bold;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 25px;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
    }

    textarea:focus {
      outline: none;
      border-color: #00d2ff;
      color: #00d2ff;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 0px 0px 15px rgba(0, 210, 255, 0.5);
    }

    button {
      width: 100%;
      background: #8bd344; 
      color: #000000;
      border: 3px solid #000000;
      padding: 15px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 6px 6px 0px #000000; 
      transition: all 0.1s ease;
    }

    #submitBtn::before { content: "▶ "; font-size: 14px; }

    button:hover {
      background: #00d2ff; 
      box-shadow: 4px 4px 0px #000000;
      transform: translate(2px, 2px);
    }

    button:active {
      box-shadow: 0px 0px 0px #000000;
      transform: translate(6px, 6px);
    }

    .result-box {
      margin-top: 25px;
      padding: 12px;
      background: #000000;
      border: 3px solid #8bd344;
      box-shadow: 6px 6px 0px rgba(0, 210, 255, 0.3);
      animation: glitchIn 0.2s linear;
    }
    
    .result-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #8bd344; }
    .hidden { display: none; }

    /* 🌌 彈出式下載視窗 (Modal) 樣式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: #0c162b;
      border: 4px solid #8bd344;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 85%;
      box-shadow: 0px 0px 25px rgba(139, 211, 68, 0.4);
    }

    .modal-content h3 {
      color: #ffffff;
      margin-top: 0;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .modal-content p {
      color: #00d2ff;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .qr-container {
      background: white;
      padding: 15px;
      display: inline-block;
      margin-bottom: 20px;
      border: 3px solid #000;
    }

    .btn-close {
      background: #ff4a4a;
      color: white;
      font-size: 14px;
      padding: 10px;
      margin-top: 10px;
      box-shadow: 4px 4px 0px #000;
    }
    .btn-close:hover { background: #ff2a2a; }

    @keyframes glitchIn {
      0% { opacity: 0; transform: scaleY(0); }
      50% { opacity: 0.5; transform: scaleY(1.2) skewX(5deg); }
      100% { opacity: 1; transform: scaleY(1) skewX(0deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>👋 歡迎光臨宇宙AI!</h1>
    <h2>關於 2045 年的未來世界，你有什麼想知道的嗎？</h2>

    <form id="questionForm">
      <textarea id="questionInput" placeholder="請輸入您的問題..."></textarea>
      <button type="submit" id="submitBtn">送出問題</button>
    </form>
    
    <div id="resultBox" class="result-box hidden">
      <h3 id="statusText">您的提問已收到！</h3>
    </div>
  </div>

  <div id="downloadModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>✨ 未來憑證已生成！</h3>
      <p>請掃描下方 QR Code 或點擊按鈕下載您的時空發票</p>
      
      <div id="qrcode" class="qr-container"></div>
      
      <button id="downloadBtn" style="margin-bottom: 15px;">💾 直接下載圖片</button>
      <button id="closeModalBtn" class="btn-close">關閉視窗</button>
    </div>
  </div>

  <script>
    // ====== 🚀 自動化核心參數設定 ======
    const GEMINI_API_KEY = "AQ.Ab8RN6JKL1gQkg1s3SzSDakm3JvdTJP20ALDg3_4TvAE1UXSsA"; 
    const INVOICE_BG_URL = "發票Demo.jpg"; 

    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');
    
    const downloadModal = document.getElementById('downloadModal');
    const qrcodeContainer = document.getElementById('qrcode');
    const downloadBtn = document.getElementById('downloadBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    let qrCodeInstance = null;

    const OFFLINE_ANSWERS = [
      "2045年的火星殖民地已開通捷運，悠遊卡可以跨星系感應，但上班依魂魄打卡。",
      "那時的貓咪已經全面接管網際網路，人類必須每天提供罐罐換取網頁瀏覽權限。",
      "數位貨幣已退流行，未來最保值的資產是2020年代生產的無污染純淨黑膠唱片。",
      "AI已經學會幫人類談戀愛，微調參數就能模擬出完美的約會回覆，但也少了靈魂。",
      "那時的天氣由氣象局中央大數據控制，每週五固定下螢光色的科技雨來淨化空氣。"
    ];

    // 表單送出事件
    questionForm.addEventListener('submit', async function(e) {
      const userQuestion = questionInput.value.trim();
      e.preventDefault(); 
      
      if (userQuestion === "") {
        alert("請先輸入您的時空疑問再送出喔！");
        return;
      }
      
      statusText.innerText = "⏳ 正在傳輸至 2045 年伺服器...";
      resultBox.classList.remove('hidden');

      // Google 表單備份發送
      const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc0bNtRRcczXZrLHVULaiWmJnYXfdaMkdm8RhRLkCw4HAw-wg/formResponse";
      const targetParam = "entry.1887716438=" + encodeURIComponent(userQuestion);

      fetch(GOOGLE_FORM_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: targetParam
      }).then(() => console.log("🚀 Google Form 發送指令已完成發射"))
        .catch(err => console.error("表單背景發送提示:", err));

      let aiAnswer = "";
      try {
        aiAnswer = await fetchGemini開示(userQuestion);
      } catch (geminiError) {
        console.warn("⚠️ 網路異常，調用本地晶片答案:", geminiError);
        aiAnswer = OFFLINE_ANSWERS[Math.floor(Math.random() * OFFLINE_ANSWERS.length)];
      }

      statusText.innerText = "🎨 正在生成您的專屬未來憑證...";
      
      // 產生憑證圖片並觸發 QR Code 流程
      processAndGenerateQR(userQuestion, aiAnswer);

      setTimeout(() => { questionInput.value = ""; }, 1000);
      setTimeout(() => { resultBox.classList.add('hidden'); }, 5000);
    });

    // 串接 Gemini API
    async function fetchGemini開示(question) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const systemInstruction = 
        "你是一個裝在時光機「REWIND THE FUTURE」互動裝置裡的宇宙 AI。\n" +
        "回覆限制：\n" +
        "1. 使用者會輸入關於2045年的未來世界，請給予對應且充滿想像、幽默且切合主題的解答。\n" +
        "2. 字數限制：繁體中文 30字至 60 字以內（包含標點符號）。\n" +
        "3. 格式限制：直接輸出解答內容，不要包含任何前言。";

      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 4000); 

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller.signal,
        body: JSON.stringify({
          contents: [{ parts: [{ text: question }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: { temperature: 0.8 }
        })
      });
      clearTimeout(id);

      const data = await response.json();
      return data.candidates[0].content.parts[0].text.trim();
    }

    // Canvas 文字自動折行演算法
    function wrapText(ctx, text, maxWidth) {
      const words = Array.from(text);
      const lines = [];
      let currentLine = "";
      for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i];
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && i > 0) {
          lines.push(currentLine);
          currentLine = words[i];
        } else {
          currentLine = testLine;
        }
      }
      lines.push(currentLine);
      return lines;
    }

    // 影像排版中樞（產出圖片並呼叫彈窗）
    function processAndGenerateQR(question, aiAnswer) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      
      img.crossOrigin = "anonymous";
      img.src = INVOICE_BG_URL;

      img.onload = function() {
        try {
          canvas.width = 384; 
          canvas.height = img.height || 450;
          
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          
          ctx.fillStyle = "#000000";
          ctx.font = "11px 'AdobeMingStd', 'Microsoft JhengHei', 'PingFang TC', sans-serif";

          ctx.fillText(question.substring(0, 15), 180, 232); 
          
          const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
          ctx.fillText(currentTime, 180, 272);

          const lines = wrapText(ctx, aiAnswer, 260); 
          let startY = 365; 
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], 80, startY + (i * 18));
          }

          openDownloadModal(canvas);
        } catch (layoutError) {
          console.error("排版繪製出錯，切換後備白底模式:", layoutError);
          runFallbackMode(canvas, ctx, question, aiAnswer);
        }
      };

      img.onerror = function() {
        console.warn("⚠️ 底圖加載異常，啟用後備動態白底模式。");
        runFallbackMode(canvas, ctx, question, aiAnswer);
      };
    }

    // 後備模式
    function runFallbackMode(canvas, ctx, question, aiAnswer) {
      try {
        const tempCtx = canvas.getContext('2d');
        tempCtx.font = "12px 'Microsoft JhengHei', sans-serif";
        const lines = wrapText(tempCtx, aiAnswer, 300);
        
        canvas.width = 384; 
        canvas.height = 140 + (lines.length * 22) + 40; 
        
        const dynamicCtx = canvas.getContext('2d');
        dynamicCtx.fillStyle = "#FFFFFF";
        dynamicCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        dynamicCtx.fillStyle = "#000000";
        dynamicCtx.font = "12px 'Microsoft JhengHei', sans-serif";
        dynamicCtx.fillText("提問: " + question.substring(0, 15), 40, 60); 
        const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });
        dynamicCtx.fillText("時間: " + currentTime, 40, 90);
        dynamicCtx.fillText("--- 來自 2045 年的開示 ---", 40, 130);
        
        let startY = 160; 
        for (let i = 0; i < lines.length; i++) {
          dynamicCtx.fillText(lines[i], 40, startY + (i * 22));
        }

        openDownloadModal(canvas);
      } catch(e) {
        console.error("後備模式發生異常:", e);
      }
    }

    // 🔓 啟用彈出視窗與產生下載點
    function openDownloadModal(canvas) {
      // 將 Canvas 轉換為純圖片 Base64 DataURL
      const imageDataUrl = canvas.toDataURL("image/jpeg");

      // 清空舊的 QR Code
      qrcodeContainer.innerHTML = "";

      // 由於純網頁本機產生的 Base64 字串太長無法塞入標準 QR Code 供跨裝置掃描，
      // 這裡的商業展覽標準做法是：產生一個讓本機瀏覽器直接開啟/下載該圖片的 QR Code，
      // 或是讓當前
