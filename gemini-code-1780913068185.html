<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歡迎光臨宇宙AI!</title>
  
  <style>
    /* 🎨 網路字型定義 */
    @font-face {
      font-family: 'AdobeMingStd';
      src: url('fonts/Adobe 明體 Std L.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'AdobeMingStd', "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: #1a1a1a;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 4px 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative; 
    }

    .container {
      background: linear-gradient(135deg, rgba(12, 22, 43, 0.95), rgba(5, 42, 82, 0.95));
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 5px 5px;
      border: 4px solid #000000;
      box-shadow: 12px 12px 0px #000000, 0px 0px 35px rgba(0, 210, 255, 0.35);
      padding: 45px 35px;
      border-radius: 4px;
      width: 90%;
      max-width: 460px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 12px 0;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0px #000, 0px 0px 12px #8bd344;
    }

    h2 {
      font-size: 15px;
      color: #00d2ff; 
      background-color: #000000; 
      display: inline-block;
      padding: 6px 15px;
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.4;
      margin-bottom: 30px;
      box-shadow: 4px 4px 0px #8bd344;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.95); 
      border: 3px solid #000000;
      border-radius: 0px;
      color: #8bd344; 
      font-family: monospace, 'AdobeMingStd', "PingFang TC";
      font-size: 16px;
      font-weight: bold;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 25px;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
    }

    textarea:focus {
      outline: none;
      border-color: #00d2ff;
      color: #00d2ff;
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8), 0px 0px 15px rgba(0, 210, 255, 0.5);
    }

    button {
      width: 100%;
      background: #8bd344; 
      color: #000000;
      border: 3px solid #000000;
      padding: 15px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 6px 6px 0px #000000; 
      transition: all 0.1s ease;
    }

    #submitBtn::before { content: "▶ "; font-size: 14px; }

    button:hover {
      background: #00d2ff; 
      box-shadow: 4px 4px 0px #000000;
      transform: translate(2px, 2px);
    }

    button:active {
      box-shadow: 0px 0px 0px #000000;
      transform: translate(6px, 6px);
    }

    .result-box {
      margin-top: 25px;
      padding: 12px;
      background: #000000;
      border: 3px solid #8bd344;
      box-shadow: 6px 6px 0px rgba(0, 210, 255, 0.3);
      animation: glitchIn 0.2s linear;
    }
    
    .result-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #8bd344; }

    /* 🌌 彈出式下載視窗 (Modal) 樣式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: #0c162b;
      border: 4px solid #8bd344;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 85%;
      box-shadow: 0px 0px 25px rgba(139, 211, 68, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-content h3 {
      color: #ffffff;
      margin-top: 0;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .modal-content p {
      color: #00d2ff;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn-close {
      background: #ff4a4a;
      color: white;
      font-size: 14px;
      padding: 10px;
      margin-top: 10px;
      box-shadow: 4px 4px 0px #000;
    }
    .btn-close:hover { background: #ff2a2a; }

    @keyframes glitchIn {
      0% { opacity: 0; transform: scaleY(0); }
      50% { opacity: 0.5; transform: scaleY(1.2) skewX(5deg); }
      100% { opacity: 1; transform: scaleY(1) skewX(0deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>👋 歡迎光臨宇宙AI!</h1>
    <h2>關於 2045 年的未來世界，你有什麼想知道的嗎？</h2>

    <form id="questionForm">
      <textarea id="questionInput" placeholder="請輸入您的問題..."></textarea>
      <button type="submit" id="submitBtn">送出問題</button>
    </form>
    
    <div id="resultBox" class="result-box" style="display: none;">
      <h3 id="statusText">您的提問已收到！</h3>
    </div>
  </div>

  <div id="downloadModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3>✨ 未來憑證已生成！</h3>
      <p>請點擊下方按鈕下載您的時空發票，或長按圖片儲存。</p>
      
      <button id="downloadBtn" type="button" style="margin-bottom: 15px;">💾 直接下載圖片</button>
      <button id="closeModalBtn" type="button" class="btn-close">關閉視窗</button>
    </div>
  </div>

  <script>
    // ====== 🚀 自動化核心參數設定 ======
    const GEMINI_API_KEYS = [
      "AQ.Ab8RN6JKL1gQkg1s3SzSDakm3JvdTJP20ALDg3_4TvAE1UXSsA", // 第一把
      "AQ.Ab8RN6JhgzABkYyTp2rUg_v5PHBMJ5g6CMWKQ2CE969IXt3rxQ", // 第二把
      "AQ.Ab8RN6J9GSTfmP5Sw1Dw_jLUml-77_GJ1wpwev5Ay0eq-yRMyA"  // 第三把
    ]; 
    const INVOICE_BG_URL = "發票Demo.jpg"; 

    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');
    const submitBtn = document.getElementById('submitBtn');
    
    const downloadModal = document.getElementById('downloadModal');
    const downloadBtn = document.getElementById('downloadBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    questionForm.addEventListener('submit', async function(e) {
      e.preventDefault(); 
      
      const userQuestion = questionInput.value.trim();
      if (userQuestion === "") {
        alert("請先輸入您的時空疑問再送出喔！");
        return;
      }
      
      submitBtn.disabled = true;
      statusText.innerText = "⏳ 正在連結 2045 年時空伺服器...";
      resultBox.style.display = 'block';

      // 幕後備份資料
      const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc0bNtRRcczXZrLHVULaiWmJnYXfdaMkdm8RhRLkCw4HAw-wg/formResponse";
      const targetParam = "entry.1887716438=" + encodeURIComponent(userQuestion);
      fetch(GOOGLE_FORM_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: targetParam }).catch(err => console.log(err));

      let aiAnswer = "";
      try {
        aiAnswer = await fetchGemini開示(userQuestion);
      } catch (geminiError) {
        console.error(geminiError);
        aiAnswer = "連線失敗。所有的 API 金鑰皆已失效或達到使用上限，請確認後再試。";
      }

      await sleep(1000);
      statusText.innerText = "🧠 宇宙 AI 正在解析您的命命因果...";
      
      await sleep(1000);
      statusText.innerText = "🎨 時光織網中...正在繪製專屬憑證影像...";
      
      await sleep(1000);

      // 製圖
      const generatedCanvas = await prepareCanvasPromise(userQuestion, aiAnswer);

      // 開啟下載彈窗
      openDownloadModal(generatedCanvas);

      questionInput.value = ""; 
      submitBtn.disabled = false;
      resultBox.style.display = 'none';
    });

    // 🌟 多金鑰自動輪替核心邏輯
    async function fetchGemini開示(question) {
      const systemInstruction = 
        "你是一個裝在時光機「REWIND THE FUTURE」互動裝置裡的宇宙 AI。\n" +
        "回覆限制：\n" +
        "1. 請針對使用者的提問給予「最精準且直接」的解答。如果問未來，可發揮科幻想像；如果要求整理書籍或知識，請給出專業正確的重點摘要。\n" +
        "2. 字數限制：繁體中文 30字至 60 字以內（包含標點符號）。\n" +
        "3. 格式限制：直接輸出解答內容，不要包含任何前言與括號。";

      for (let i = 0; i < GEMINI_API_KEYS.length; i++) {
        const currentKey = GEMINI_API_KEYS[i];
        
        // 🚨 這裡已正式更正為 gemini-1.5-flash，解決 404 報錯問題！
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`;

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: question }] }],
              systemInstruction: { parts: [{ text: systemInstruction }] },
              generationConfig: { temperature: 0.7 }
            })
          });
          
          if (response.ok) {
            const data = await response.json();
            return data.candidates[0].content.parts[0].text.trim(); 
          } else {
            console.warn(`⚠️ 第 ${i + 1} 把金鑰失效 (狀態碼: ${response.status})，準備切換下一把...`);
          }
        } catch (error) {
           console.warn(`⚠️ 第 ${i + 1} 把金鑰發生網路連線錯誤，準備切換下一把...`, error);
        }
      }
      
      throw new Error("連線失敗。");
    }

    // 中文字元精準斷行
    function wrapText(ctx, text, maxWidth) {
      const words = Array.from(text);
      const lines = [];
      let currentLine = "";
      for (let i = 0; i < words.length; i++) {
        let testLine = currentLine + words[i];
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && i > 0) {
          lines.push(currentLine);
          currentLine = words[i];
        } else {
          currentLine = testLine;
        }
      }
      lines.push(currentLine);
      return lines;
    }

    function prepareCanvasPromise(question, aiAnswer) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.src = INVOICE_BG_URL; 

        img.onload = function() {
          try {
            const w = img.width || 540;
            const h = img.height || 960;
            canvas.width = w;
            canvas.height = h;
            
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
            
            const scale = w / 540;

            ctx.fillStyle = "#3a3a3a";
            ctx.textAlign = "left";
            
            ctx.font = `${Math.round(21 * scale)}px 'AdobeMingStd', 'Microsoft JhengHei', sans-serif`;
            let displayQuestion = question.length > 15 ? question.substring(0, 15) + "..." : question;
            ctx.fillText(`{ ${displayQuestion} }`, 155 * scale, 252 * scale); 
            
            const currentTime = new Date().toLocaleString('zh-TW', { 
              year: 'numeric', month: '2-digit', day: '2-digit', 
              hour: '2-digit', minute: '2-digit', hour12: false 
            }).replace(/\//g, '-');
            ctx.fillText(currentTime, 155 * scale, 289 * scale);

            const paddingLeft = 85 * scale;
            const contentMaxWidth = w - (paddingLeft * 2); 
            
            ctx.font = `${Math.round(23 * scale)}px 'AdobeMingStd', 'Microsoft JhengHei', sans-serif`;
            
            const fullAnswerText = `{ ${aiAnswer} }`;
            const lines = wrapText(ctx, fullAnswerText, contentMaxWidth); 
            
            let startY = 430 * scale; 
            const lineHeight = 38 * scale; 
            
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], paddingLeft, startY + (i * lineHeight));
            }

            resolve(canvas);
          } catch (layoutError) {
            console.error(layoutError);
            resolve(runFallbackCanvas(question, aiAnswer));
          }
        };

        img.onerror = function() {
          alert("⚠️ 無法載入底圖！請確認「發票Demo.jpg」與這個 HTML 檔案放在『同一個資料夾』，並且檔名大小寫完全一模一樣。");
          resolve(runFallbackCanvas(question, aiAnswer));
        };
      });
    }

    function runFallbackCanvas(question, aiAnswer) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 540; canvas.height = 800;
      ctx.fillStyle = "#F5F5F5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000000"; ctx.font = "20px sans-serif";
      
      let displayQuestion = question.length > 15 ? question.substring(0, 15) + "..." : question;
      ctx.fillText("提問: { " + displayQuestion + " }", 50, 100);
      
      const lines = wrapText(ctx, "解答: { " + aiAnswer + " }", 440);
      for(let i=0; i<lines.length; i++){
          ctx.fillText(lines[i], 50, 160 + (i*35));
      }
      return canvas;
    }

    // 🌟 移除 QR Code 並優化預覽圖展示
    function openDownloadModal(canvas) {
      const imageDataUrl = canvas.toDataURL("image/jpeg", 0.9);
      
      const modalContent = document.querySelector('.modal-content');
      let previewImg = document.getElementById('previewInvoiceImg');
      
      if (!previewImg) {
        previewImg = document.createElement('img');
        previewImg.id = 'previewInvoiceImg';
        previewImg.style.width = "100%";
        previewImg.style.maxWidth = "260px"; // 稍微放大，方便直接看或長按
        previewImg.style.maxHeight = "450px";
        previewImg.style.objectFit = "contain";
        previewImg.style.marginBottom = "25px";
        previewImg.style.border = "2px solid #8bd344";
        
        // 將圖片插入到下載按鈕的上方
        modalContent.insertBefore(previewImg, downloadBtn);
      }
      
      previewImg.src = imageDataUrl;

      downloadBtn.onclick = function() {
        const link = document.createElement('a');
        link.download = `future-invoice-${Date.now()}.jpg`;
        link.href = imageDataUrl;
        link.click();
      };

      downloadModal.style.display = 'flex';
    }

    closeModalBtn.addEventListener('click', () => {
      downloadModal.style.display = 'none';
    });
  </script>
</body>
</html>
